// Build flat emoji list for search
const allEmojis = [];
categories.forEach(cat => {
  cat.emojis.forEach(e => allEmojis.push({ emoji: e, cat: cat.name, name: emojiNames[e] || "" }));
});

// ── Top Recommended (recently clicked) ──────────────────────────────────────
const MAX_RECENT = 20;
function getRecent() {
  try { return JSON.parse(localStorage.getItem("recentEmojis") || "[]"); } catch { return []; }
}
function saveRecent(list) {
  localStorage.setItem("recentEmojis", JSON.stringify(list));
}
function addToRecent(emoji) {
  let list = getRecent().filter(e => e !== emoji);
  list.unshift(emoji);
  if (list.length > MAX_RECENT) list = list.slice(0, MAX_RECENT);
  saveRecent(list);
  renderRecommended();
}

function renderRecommended() {
  const existing = document.getElementById("recommended-section");
  if (existing) existing.remove();
  const list = getRecent();
  if (!list.length) return;

  const content = document.getElementById("content");
  const section = document.createElement("div");
  section.className = "section";
  section.id = "recommended-section";

  const header = document.createElement("div");
  header.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;";

  const h2 = document.createElement("h2");
  h2.style.margin = "0";
  h2.innerHTML = "⭐ TOP RECOMMENDED";

  const clearBtn = document.createElement("button");
  clearBtn.textContent = "Clear";
  clearBtn.style.cssText = "background:#2a2a3e;border:1px solid #444;color:#aaa;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.78rem;";
  clearBtn.onclick = () => { saveRecent([]); renderRecommended(); };

  header.appendChild(h2);
  header.appendChild(clearBtn);
  section.appendChild(header);

  const grid = document.createElement("div");
  grid.className = "grid";
  list.forEach(e => grid.appendChild(makeBtn(e)));
  section.appendChild(grid);

  content.insertBefore(section, content.firstChild);
}

let activeTab = "all";

// Render tabs
const tabsEl = document.getElementById("tabs");
const allTab = document.createElement("button");
allTab.className = "tab active";
allTab.textContent = "All";
allTab.dataset.cat = "all";
allTab.onclick = () => setTab("all");
tabsEl.appendChild(allTab);

categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "tab";
  btn.textContent = cat.name;
  btn.dataset.cat = cat.name;
  btn.onclick = () => setTab(cat.name);
  tabsEl.appendChild(btn);
});

function setTab(name) {
  activeTab = name;
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.cat === name);
  });
  render();
}

function render(query = "") {
  const content = document.getElementById("content");
  content.innerHTML = "";
  const q = query.trim().toLowerCase();

  if (q) {
    // Search by emoji name or category
    const matches = allEmojis.filter(item =>
      item.name.toLowerCase().includes(q) ||
      item.cat.toLowerCase().includes(q) ||
      item.emoji.includes(q)
    );
    if (!matches.length) {
      content.innerHTML = `<p class="no-results">No emojis found for "${q}" 😢</p>`;
      return;
    }
    const section = document.createElement("div");
    section.className = "section";
    const h2 = document.createElement("h2");
    h2.textContent = `Results (${matches.length})`;
    section.appendChild(h2);
    const grid = document.createElement("div");
    grid.className = "grid";
    matches.forEach(item => grid.appendChild(makeBtn(item.emoji)));
    section.appendChild(grid);
    content.appendChild(section);
    return;
  }

  // Show all categories, then inject recommended on top
  const list = activeTab === "all" ? categories : categories.filter(c => c.name === activeTab);
  list.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";
    const h2 = document.createElement("h2");
    h2.textContent = cat.name;
    section.appendChild(h2);
    const grid = document.createElement("div");
    grid.className = "grid";
    cat.emojis.forEach(e => grid.appendChild(makeBtn(e)));
    section.appendChild(grid);
    content.appendChild(section);
  });

  renderRecommended();
}

function makeBtn(emoji) {
  const btn = document.createElement("button");
  btn.className = "emoji-btn";
  btn.textContent = emoji;
  const name = emojiNames[emoji] ? emojiNames[emoji].split(" ").slice(0,3).join(", ") : "";
  btn.title = name || "Click to copy";
  btn.onclick = () => copyEmoji(emoji, btn);
  return btn;
}

let toastTimeout;
function copyEmoji(emoji, btn) {
  navigator.clipboard.writeText(emoji).then(() => {
    btn.classList.add("copied");
    setTimeout(() => btn.classList.remove("copied"), 1000);
    showToast(`Copied ${emoji}`);
    addToRecent(emoji);
  });
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg + " ✓";
  toast.classList.add("show");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove("show"), 2000);
}

document.getElementById("search").addEventListener("input", e => {
  render(e.target.value);
});

render();
</script>
